  const tbodyId = 'tb_' + ticker;

  const block = document.createElement('div');
  block.className = 'block';
  block.innerHTML = `
    <div class="ticker-label">${ticker}</div>
    <table>
      <thead><tr>
        <th data-col="time">Time</th>
        <th data-col="spot">Price</th>
        <th data-col="gex_display">GEX</th>
        <th data-col="mp">MP</th>
        <th data-col="cw">CW</th>
        <th data-col="pw">PW</th>
      </tr></thead>
      <tbody id="${tbodyId}"></tbody>
    </table>`;
  root.appendChild(block);

  function render(d) {
    document.getElementById(tbodyId).innerHTML = d.map(r => {
      const g = fmtGex(r);
      return `<tr>
        <td>${r.time}</td>
        <td>$${r.spot.toFixed(2)}</td>
        <td class="${g.cls}">${g.dot} ${g.str}</td>
        <td class="muted">$${r.mp}</td>
        <td class="muted">$${r.cw}</td>
        <td class="muted">$${r.pw}</td>
      </tr>`;
    }).join('');
  }

  render(rows);

  block.querySelectorAll('th').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      block.querySelectorAll('th').forEach(t => t.className = '');
      if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
      th.className = sortDir === 1 ? 'asc' : 'desc';
      const sorted = [...rows].sort((a, b) => {
        const av = a[col], bv = b[col];
        return typeof av === 'string' ? av.localeCompare(bv) * sortDir : (av - bv) * sortDir;
      });
      render(sorted);
    });
  });
});
</script>
</body>
</html>
