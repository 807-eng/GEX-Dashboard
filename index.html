<html lang="zh-Hant">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEX Dashboard 2026-04-02</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f9f7; color: #1a1a1a; padding: 0.75rem 1rem; }
  h1 { font-size: 13px; font-weight: 500; color: #666; margin-bottom: 1rem; padding-bottom: 6px; border-bottom: 1px solid #e0e0e0; }
  .block { margin-bottom: 1.25rem; }
  .ticker-label { font-size: 12px; font-weight: 700; letter-spacing: 0.06em; color: #111; padding-bottom: 2px; border-bottom: 1.5px solid #ddd; margin-bottom: 1px; }
  table { border-collapse: collapse; width: auto; table-layout: auto; font-size: 11px; font-family: "SF Mono", "Fira Mono", "Consolas", monospace; }
  th { font-size: 10px; font-weight: 500; color: #aaa; padding: 2px 10px 2px 6px; border-bottom: 0.5px solid #e8e8e8; text-align: left; cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { color: #333; }
  th.asc::after  { content: ' ▲'; font-size: 8px; }
  th.desc::after { content: ' ▼'; font-size: 8px; }
  td { padding: 2px 10px 2px 6px; border-bottom: 0.5px solid #f0f0f0; white-space: nowrap; font-variant-numeric: tabular-nums; line-height: 1.6; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f4f4f2; }
  .red  { color: #8b1a1a; }
  .grn  { color: #2a5e1a; }
  .muted { color: #999; }
  .footer { font-size: 10px; color: #ccc; margin-top: 1.5rem; }
</style>
</head>
<body>
<h1>📊 GEX Dashboard &nbsp;&nbsp;2026-04-02 &nbsp;|&nbsp; Last updated: 2026-04-02 06:18 PST</h1>
<div id="root"></div>
<p class="footer">Auto-updated every 30 min during market hours</p>
<script>
const data = {"TSLA": [{"time": "06:08", "spot": 370.61, "gex_display": 154.0, "gex_unit": "M", "gex_at": 380.0, "mp": 365.0, "cw": 380.0, "pw": 295.0}, {"time": "06:18", "spot": 366.36, "gex_display": 154.0, "gex_unit": "M", "gex_at": 380.0, "mp": 365.0, "cw": 380.0, "pw": 295.0}], "NVDA": [{"time": "06:08", "spot": 171.21, "gex_display": 86.3, "gex_unit": "M", "gex_at": 175.0, "mp": 170.0, "cw": 175.0, "pw": 165.0}, {"time": "06:18", "spot": 171.07, "gex_display": 86.3, "gex_unit": "M", "gex_at": 175.0, "mp": 170.0, "cw": 175.0, "pw": 165.0}], "AAPL": [{"time": "06:08", "spot": 253.44, "gex_display": 104.3, "gex_unit": "M", "gex_at": 255.0, "mp": 255.0, "cw": 255.0, "pw": 252.5}, {"time": "06:18", "spot": 253.36, "gex_display": 89.5, "gex_unit": "M", "gex_at": 255.0, "mp": 252.5, "cw": 255.0, "pw": 252.5}], "MSFT": [{"time": "06:08", "spot": 365.02, "gex_display": 31.3, "gex_unit": "M", "gex_at": 370.0, "mp": 370.0, "cw": 370.0, "pw": 367.5}, {"time": "06:18", "spot": 365.19, "gex_display": 37.7, "gex_unit": "M", "gex_at": 370.0, "mp": 365.0, "cw": 370.0, "pw": 365.0}], "AMZN": [{"time": "06:08", "spot": 205.2, "gex_display": 63.0, "gex_unit": "M", "gex_at": 210.0, "mp": 207.5, "cw": 210.0, "pw": 205.0}, {"time": "06:18", "spot": 170.87, "gex_display": 57.7, "gex_unit": "M", "gex_at": 212.5, "mp": 165.0, "cw": 212.5, "pw": 195.0}], "GOOGL": [{"time": "06:08", "spot": 288.96, "gex_display": 19.8, "gex_unit": "M", "gex_at": 297.5, "mp": 290.0, "cw": 297.5, "pw": 280.0}, {"time": "06:18", "spot": 288.78, "gex_display": 52.0, "gex_unit": "M", "gex_at": 300.0, "mp": 282.5, "cw": 300.0, "pw": 280.0}], "META": [{"time": "06:08", "spot": 561.84, "gex_display": 242.7, "gex_unit": "M", "gex_at": 580.0, "mp": 565.0, "cw": 580.0, "pw": 577.5}, {"time": "06:18", "spot": 560.27, "gex_display": 29.0, "gex_unit": "M", "gex_at": 582.5, "mp": 552.5, "cw": 582.5, "pw": 590.0}], "SPY": [{"time": "06:08", "spot": 645.41, "gex_display": -354.5, "gex_unit": "M", "gex_at": 657.0, "mp": 646.0, "cw": 660.0, "pw": 657.0}, {"time": "06:18", "spot": 645.44, "gex_display": -354.5, "gex_unit": "M", "gex_at": 657.0, "mp": 646.0, "cw": 660.0, "pw": 657.0}], "QQQ": [{"time": "06:08", "spot": 573.04, "gex_display": 117.2, "gex_unit": "M", "gex_at": 590.0, "mp": 573.0, "cw": 590.0, "pw": 575.0}, {"time": "06:18", "spot": 573.36, "gex_display": 117.2, "gex_unit": "M", "gex_at": 590.0, "mp": 573.0, "cw": 590.0, "pw": 575.0}], "IWM": [{"time": "06:08", "spot": 244.74, "gex_display": -52.4, "gex_unit": "M", "gex_at": 240.0, "mp": 248.0, "cw": 250.0, "pw": 240.0}, {"time": "06:18", "spot": 244.74, "gex_display": -52.4, "gex_unit": "M", "gex_at": 240.0, "mp": 248.0, "cw": 250.0, "pw": 240.0}]};
const order = ["TSLA", "NVDA", "AAPL", "MSFT", "AMZN", "GOOGL", "META", "SPY", "QQQ", "IWM"];

function fmtGex(entry) {
  const isRed = entry.gex_display < 0;
  const abs = Math.abs(entry.gex_display);
  const unit = abs >= 1000 ? (abs/1000).toFixed(1)+'B' : abs+entry.gex_unit;
  const str = (isRed ? '-' : '+') + '$' + unit + ' @$' + entry.gex_at;
  return { cls: isRed ? 'red' : 'grn', dot: isRed ? '🔴' : '🟢', str };
}

const root = document.getElementById('root');

order.forEach(ticker => {
  const rows = data[ticker];
  if (!rows || rows.length === 0) return;
  let sortCol = 'time', sortDir = 1;
  const tbodyId = 'tb_' + ticker;

  const block = document.createElement('div');
  block.className = 'block';
  block.innerHTML = `
    <div class="ticker-label">${ticker}</div>
    <table>
      <thead><tr>
        <th data-col="time">Time</th>
        <th data-col="spot">Price</th>
        <th data-col="gex_display">GEX</th>
        <th data-col="mp">MP</th>
        <th data-col="cw">CW</th>
        <th data-col="pw">PW</th>
      </tr></thead>
      <tbody id="${tbodyId}"></tbody>
    </table>`;
  root.appendChild(block);

  function render(d) {
    document.getElementById(tbodyId).innerHTML = d.map(r => {
      const g = fmtGex(r);
      return `<tr>
        <td>${r.time}</td>
        <td>$${r.spot.toFixed(2)}</td>
        <td class="${g.cls}">${g.dot} ${g.str}</td>
        <td class="muted">$${r.mp}</td>
        <td class="muted">$${r.cw}</td>
        <td class="muted">$${r.pw}</td>
      </tr>`;
    }).join('');
  }

  render(rows);

  block.querySelectorAll('th').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      block.querySelectorAll('th').forEach(t => t.className = '');
      if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
      th.className = sortDir === 1 ? 'asc' : 'desc';
      const sorted = [...rows].sort((a, b) => {
        const av = a[col], bv = b[col];
        return typeof av === 'string' ? av.localeCompare(bv) * sortDir : (av - bv) * sortDir;
      });
      render(sorted);
    });
  });
});
</script>
</body>
