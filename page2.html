<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEX Dashboard 2026-04-10 — Page 2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f9f7; color: #1a1a1a; padding: 0; }
  .header { padding: 10px 14px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .header-title { font-size: 12px; color: #666; }
  .page-link { font-size: 11px; color: #666; text-decoration: none; border: 1px solid #ddd; padding: 3px 10px; border-radius: 6px; }
  .page-link:hover { background: #f0f0ee; }
  .tabs { display: flex; gap: 4px; padding: 10px 14px; border-bottom: 1px solid #e0e0e0; overflow-x: auto; }
  .tab { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; padding: 4px 14px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; background: transparent; color: #888; white-space: nowrap; }
  .tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .panel { display: none; padding: 10px 14px; }
  .panel.active { display: block; }
  table { border-collapse: collapse; width: auto; font-size: 11px; font-family: "SF Mono", "Fira Mono", "Consolas", monospace; }
  th { font-size: 10px; font-weight: 500; color: #aaa; padding: 3px 12px 3px 0; border-bottom: 0.5px solid #e8e8e8; text-align: left; white-space: nowrap; }
  td { padding: 3px 12px 3px 0; border-bottom: 0.5px solid #f0f0f0; white-space: nowrap; font-variant-numeric: tabular-nums; line-height: 1.6; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f4f4f2; }
  .red  { color: #8b1a1a; }
  .grn  { color: #2a5e1a; }
  .muted { color: #999; }
  .footer { font-size: 10px; color: #ccc; padding: 8px 14px; border-top: 1px solid #e0e0e0; }
</style>
</head>
<body>
<div class="header">
  <span class="header-title">📊 GEX Dashboard &nbsp;2026-04-10 &nbsp;|&nbsp; Last updated: 2026-04-10 06:16 PST</span>
  <a href="index.html" class="page-link">← Page 1</a>
</div>
<div class="tabs" id="tab-container"></div>
<div id="panel-container"></div>
<div class="footer">Auto-updated every 10 min during market hours</div>
<script>
const data = {"GOOGL": [{"time": "06:16", "spot": 0, "gex_display": 54.4, "gex_unit": "M", "gex_at": 322.5, "gex2_display": 38.2, "gex2_unit": "M", "gex2_at": 320.0, "mp": 185.0, "cw": 322.5, "pw": 312.5}], "META": [{"time": "06:16", "spot": 636.42, "gex_display": 42.6, "gex_unit": "M", "gex_at": 630.0, "gex2_display": 27.4, "gex2_unit": "M", "gex2_at": 635.0, "mp": 615.0, "cw": 630.0, "pw": 590.0}], "SPY": [{"time": "06:16", "spot": 681.15, "gex_display": 683.5, "gex_unit": "M", "gex_at": 680.0, "gex2_display": 455.5, "gex2_unit": "M", "gex2_at": 679.0, "mp": 675.0, "cw": 680.0, "pw": 670.0}], "QQQ": [{"time": "06:16", "spot": 611.9, "gex_display": 221.0, "gex_unit": "M", "gex_at": 608.0, "gex2_display": 182.6, "gex2_unit": "M", "gex2_at": 610.0, "mp": 606.0, "cw": 608.0, "pw": 600.0}], "IWM": [{"time": "06:16", "spot": 262.58, "gex_display": 20.8, "gex_unit": "M", "gex_at": 263.0, "gex2_display": 19.3, "gex2_unit": "M", "gex2_at": 264.0, "mp": 257.5, "cw": 263.0, "pw": 245.0}]};
const tickers = ["GOOGL", "META", "SPY", "QQQ", "IWM"];

const tabContainer = document.getElementById("tab-container");
const panelContainer = document.getElementById("panel-container");

tickers.forEach((ticker, i) => {
  const btn = document.createElement("button");
  btn.className = "tab" + (i === 0 ? " active" : "");
  btn.textContent = ticker;
  btn.onclick = () => show(ticker, btn);
  tabContainer.appendChild(btn);

  const panel = document.createElement("div");
  panel.id = ticker;
  panel.className = "panel" + (i === 0 ? " active" : "");
  const rows = data[ticker] || [];
  const rowsHtml = rows.map(r => {
    const isRed = r.gex_display < 0;
    const abs = Math.abs(r.gex_display);
    const unit = abs >= 1000 ? (abs/1000).toFixed(1)+"B" : abs+r.gex_unit;
    const gexStr = (isRed ? "-" : "+") + "$" + unit + " @$" + r.gex_at;
    const cls = isRed ? "red" : "grn";
    const dot = isRed ? "🔴" : "🟢";
    const isRed2 = r.gex2_display < 0;
    const abs2 = Math.abs(r.gex2_display);
    const unit2 = abs2 >= 1000 ? (abs2/1000).toFixed(1)+"B" : abs2+r.gex2_unit;
    const gex2Str = (isRed2 ? "-" : "+") + "$" + unit2 + " @$" + r.gex2_at;
    const cls2 = isRed2 ? "red" : "grn";
    const dot2 = isRed2 ? "🔴" : "🟢";
    return "<tr><td>" + r.time + "</td><td>$" + r.spot.toFixed(2) + "</td>"
      + "<td class=\"" + cls + "\">" + dot + " " + gexStr + "</td>"
      + "<td class=\"" + cls2 + "\">" + dot2 + " " + gex2Str + "</td>"
      + "<td class=\"muted\">$" + r.mp + "</td>"
      + "<td class=\"muted\">$" + r.cw + "</td>"
      + "<td class=\"muted\">$" + r.pw + "</td></tr>";
  }).join("");
  panel.innerHTML = "<table><thead><tr><th>Time</th><th>Price</th><th>GEX</th><th>GEX2</th><th>MP</th><th>CW</th><th>PW</th></tr></thead><tbody>" + rowsHtml + "</tbody></table>";
  panelContainer.appendChild(panel);
});

function show(id, btn) {
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  btn.classList.add("active");
}
</script>
</body>
</html>
